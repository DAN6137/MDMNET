name: Build Android APK

on:
  push:
    branches: [ main, master ] # ירוץ בכל פעם שתעלה קוד לענף הראשי
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x pcapmdmblocker/gradlew

    - name: Build with Gradle
      run: cd pcapmdmblocker && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: pcapmdmblocker/app/build/outputs/apk/debug/app-debug.apk
